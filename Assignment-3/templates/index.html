<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Quiz Master</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
</head>
<body class="home-page">

  <div class="bg-orbs">
    <div class="orb orb1"></div>
    <div class="orb orb2"></div>
    <div class="orb orb3"></div>
  </div>

  <main class="hero-container">
    <div class="badge">Web Development Quiz</div>
    <h1 class="hero-title">
      Test Your<br/>
      <span class="accent">Knowledge</span>
    </h1>
    <p class="hero-subtitle">
      5 randomized questions on HTML, CSS, Python &amp; Flask.<br/>
      Includes negative marking &mdash; choose wisely!
    </p>

    <div class="stats-row">
      <div class="stat-card">
        <span class="stat-num">5</span>
        <span class="stat-label">Questions</span>
      </div>
      <div class="stat-card">
        <span class="stat-num">5</span>
        <span class="stat-label">Marks</span>
      </div>
      <div class="stat-card">
        <span class="stat-num">-0.25</span>
        <span class="stat-label">Wrong Ans</span>
      </div>
      <div class="stat-card">
        <span class="stat-num">120s</span>
        <span class="stat-label">Timer</span>
      </div>
    </div>

    <a href="{{ url_for('quiz') }}" class="btn-start">
      Start Quiz
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M5 12h14M12 5l7 7-7 7"/>
      </svg>
    </a>

    <p class="rules-note">Questions are shuffled every attempt.</p>
  </main>

</body>
</html>
